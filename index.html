<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WisataKu — Jelajahi Tempat Wisata Indonesia</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">🗺️</span>
          <span class="logo-text">WisataKu</span>
        </div>
        <p class="header-tagline">Jelajahi Keindahan Nusantara</p>
      </div>

      <!-- SEARCH & FILTER -->
      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Cari tempat wisata..."
          oninput="filterWisata()"
        />
        <select id="categoryFilter" onchange="filterWisata()">
          <option value="">Semua Kategori</option>
          <option value="Alam">Alam</option>
          <option value="Budaya">Budaya & Sejarah</option>
          <option value="Pantai">Pantai</option>
          <option value="Kota">Wisata Kota</option>
        </select>
      </div>

      <!-- TOGGLE SUMBER DATA (BARU) -->
      <div class="source-toggle">
        <span class="source-label">Sumber Data:</span>
        <div class="toggle-group">
          <button id="btnAPI" class="toggle-btn active" onclick="gantiSumber('api')">
            🌐 Wikipedia API
          </button>
          <button id="btnStatis" class="toggle-btn" onclick="gantiSumber('statis')">
            📦 Data Statis
          </button>
        </div>
      </div>

    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="container">

      <!-- STATS BAR -->
      <div class="stats-bar" id="statsBar">
        <span id="totalCount">Memuat data...</span>
      </div>

      <!-- LOADING STATE -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p id="loadingText">Mengambil data dari Wikipedia API...</p>
      </div>

      <!-- ERROR STATE -->
      <div class="error-state" id="errorState" style="display:none;">
        <p>⚠️ API gagal. Otomatis beralih ke data statis.</p>
      </div>

      <!-- CARD GRID -->
      <div class="card-grid" id="cardGrid"></div>

      <!-- EMPTY STATE -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <p>😕 Tidak ada tempat wisata yang cocok dengan pencarian kamu.</p>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 WisataKu &mdash; Tugas Pemrograman Web | Universitas Muhammadiyah Tangerang</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
